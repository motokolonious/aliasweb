    <link rel="stylesheet" type="text/css" href="divisors.css">

  <body>
    <header>
      <a>

      <div class="header__langsel">
        <select id="header__langselect">
          <option value="Arabic">عربي</option>
          <option value="English">إنجليزي</option>
          <option value="English">English</option>
        </select>
        <label for="header__langselect">:لغة</label>
      </div>
      <div class="header__themesel">
        <select id="header__themeselect">
          <option>الأرض</option>
          <option>القمر</option>
          <option>الغابة</option>
        </select>
        <label for="header__themeselect">:ألوان</label>
      </div>
      <a class="header__srcodeanchor" href="https://github.com/motokolonious/aliasweb">شفرة مصدرية</a>
    </header>
    <article>
      <div class="aliascontainer">
        <h1 dir="rtl">اهلا، أنا <span class="alias">لونيوس<span class="aliasinfo">اسم مستعار</span></span></h1>
      </div>
      <br />

      <br />
      <h3>اهتمامات عظيمة</h3>
      <ul>
        <li>صحة</li>

      <br />
      <div class="profileabt">

    <footer>
      <p>&#9888;محتوى إضاف متاح لمستخدم حقيقي&#9888;</p>
      <br />
      <p>&#169;قانون&#169;</p>
    </footer>
    <script type="text/javascript">
      function getUrlRoot() {
        const lastfsIndex = document.URL.lastIndexOf('/');
        return document.URL.substring(0, lastfsIndex + 1);
      }
      function assignNewLocation(resourcePath) {
        if (typeof resourcePath !== "string") return;
        if (!resourcePath.endsWith("php") && !resourcePath.endsWith("htm")) return;
        const newUrl = getUrlRoot() + resourcePath;
        document.location.assign(newUrl);
      }
      const langselid = "header__langselect";
      const langsel = document.getElementById(langselid);
      langsel.addEventListener("change", e => {
        if (e.target.value === "English") {
          assignNewLocation("index.htm");
        }
      });
    </script>
  </body>
</html>
